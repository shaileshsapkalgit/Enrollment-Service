name: CI - Build and Test

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: write    # read → write changed!

jobs:
  build-test-push:
    name: Build, Test and Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      # ─── Step 1 ───
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Step 2 ───
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ─── Step 3 ───
      - name: Build with Maven
        run: mvn clean compile -B

      # ─── Step 4 ───
      - name: Run Tests
        run: mvn test -B

      # ─── Step 5 ───
      - name: Build JAR
        run: mvn clean package -DskipTests -B

      # ─── Step 6 ───
      - name: Generate Image Tag
        id: image-tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=$(grep 'tag:' helm-chart/values.yaml | awk '{print $2}' | tr -d '"')
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "🏷️ Image tag: ${TAG}"

      # ─── Step 6.5 ───
      - name: Update values.yaml tag
        if: github.ref_type == 'tag'    # sirf tag push la run heil!
        run: |
          sed -i "s/tag:.*/tag: \"${{ github.ref_name }}\"/" helm-chart/values.yaml
          echo "✅ Updated tag to: ${{ github.ref_name }}"

      # ─── Step 6.6 ───
      - name: Commit and Push values.yaml
        if: github.ref_type == 'tag'    # sirf tag push la run heil!
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm-chart/values.yaml
          git commit -m "ci: update image tag to ${{ github.ref_name }}"
          git push origin HEAD:main

      # ─── Step 7 ───
      - name: Docker Build
        run: |
          docker build -t enrollment-service:${{ steps.image-tag.outputs.tag }} .

      # ─── Step 8 ───
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: enrollment-service:${{ steps.image-tag.outputs.tag }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # ─── Step 9 ───
      - name: Configure AWS credentials (OIDC)
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ─── Step 10 ───
      - name: Login to ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ─── Step 11 ───
      - name: Push to ECR
        if: github.event_name != 'pull_request'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          docker tag enrollment-service:$IMAGE_TAG \
            $ECR_REGISTRY/devops-portfolio/enrollment-service:$IMAGE_TAG
          docker tag enrollment-service:$IMAGE_TAG \
            $ECR_REGISTRY/devops-portfolio/enrollment-service:latest
          docker push $ECR_REGISTRY/devops-portfolio/enrollment-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/devops-portfolio/enrollment-service:latest
          echo "✅ Pushed: $ECR_REGISTRY/devops-portfolio/enrollment-service:$IMAGE_TAG"