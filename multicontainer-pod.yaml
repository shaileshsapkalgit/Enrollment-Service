apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  namespace: practice
spec:
  containers:
  - name: nginx-container
    image: nginx
    ports:
    - containerPort: 80

  - name: busybox-container
    image: busybox
    command: ['sh', '-c', 'while true; do echo "Hello from busybox"; sleep 5; done']