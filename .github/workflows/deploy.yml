name: CD - Deploy to EKS

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types:
      - completed
    branches:
      - v*.*.*

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev

permissions:
  id-token: write
  contents: read

jobs:
  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.event.workflow_run.conclusion == 'success'
      || github.event_name == 'workflow_dispatch' }}

    steps:
      # ─── Step 1 ───
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Step 2 ───
      - name: Get Image Tag
        id: image-tag
        run: |
          TAG=$(grep 'tag:' helm-chart/values.yaml | awk '{print $2}' | tr -d '"')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "🏷️ Deploying tag: ${TAG}"

      # ─── Step 3 ───
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ─── Step 4 ───
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name devops-portfolio-dev \
            --region ${{ secrets.AWS_REGION }}

      # ─── Step 5 ───
      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.17.0'

      # ─── Step 6 ───
      - name: Deploy with Helm
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          helm upgrade --install enrollment-service ./helm-chart \
            --namespace dev \
            --create-namespace \
            --set image.tag=$IMAGE_TAG \
            --set image.repository=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/devops-portfolio/enrollment-service \
            --timeout 10m

      # ─── Step 7 ───
      - name: Debug Pod Status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n dev
          echo "=== Events ==="
          kubectl get events -n dev --sort-by='.lastTimestamp'
          echo "=== Logs ==="
          kubectl logs -n dev -l app.kubernetes.io/name=enrollment-service --tail=30 || true

      # ─── Step 8 ───
      - name: Verify Deployment
        run: |
          kubectl get pods -n dev
          echo "✅ Enrollment-Service Deployed Successfully!"