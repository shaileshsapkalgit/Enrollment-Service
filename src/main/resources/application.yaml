server:
  port: 8082

spring:
  application:
    name: enrollment-service

  datasource:
    url: jdbc:h2:mem:enrollmentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# Student Service URL
student:
  service:
    url: http://localhost:8081