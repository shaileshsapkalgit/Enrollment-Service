replicaCount: 2

image:
  repository: 361697161922.dkr.ecr.us-east-1.amazonaws.com/devops-portfolio/enrollment-service
  pullPolicy: IfNotPresent
  tag: "v1.0.7"

serviceAccount:
  create: true
  automount: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::361697161922:role/devops-portfolio-dev-enrollment-service-irsa
  name: "enrollment-service"

service:
  type: LoadBalancer
  port: 80
  targetPort: 8082

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: ""
      paths:
        - path: /enrollment(/|$)(.*)
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "768Mi"
    cpu: "300m"

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8082
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: 8082
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 90

env:
  SPRING_PROFILES_ACTIVE: "dev"
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
  STUDENT_SERVICE_URL: "http://student-service:8081"
